<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Metais (Modo Compatível)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-5">

    <h1 class="text-3xl font-bold mt-5 mb-8">Detector de Metais</h1>

    <div class="w-full max-w-xs bg-gray-800 rounded-2xl p-6 shadow-xl">
        <!-- Indicador Visual -->
        <div class="relative w-48 h-48 mx-auto mb-6">
            <div id="indicator" class="w-full h-full rounded-full bg-green-600 shadow-[0_0_30px_rgba(22,163,74,0.6)] flex items-center justify-center transition-all duration-150 ease-out">
                <span id="statusText" class="text-lg font-bold">0</span>
            </div>
        </div>

        <!-- Valores -->
        <div class="text-center mb-6 space-y-1">
            <p class="text-gray-400 text-sm">Variação Magnética</p>
            <p id="valueDisplay" class="text-2xl font-bold">0.00 µT</p>
        </div>

        <!-- Controles -->
        <div class="space-y-5">
            <!-- Sensibilidade -->
            <div>
                <label for="sensitivity" class="block text-sm text-gray-400 mb-2">Sensibilidade: <span id="sensValue">10</span></label>
                <input type="range" id="sensitivity" min="1" max="50" value="10" 
                       class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>

            <!-- Ganho -->
            <div>
                <label for="gain" class="block text-sm text-gray-400 mb-2">Ganho: <span id="gainValue">1</span>x</label>
                <input type="range" id="gain" min="1" max="10" step="0.5" value="1" 
                       class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>

            <!-- Botão Calibrar -->
            <button id="calibrateBtn" 
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold transition-colors duration-200 shadow-lg">
                CALIBRAR
            </button>
        </div>
    </div>

    <p class="text-xs text-gray-500 mt-8 text-center">
        Modo Compatível Activado.<br>
        Mantenha o aparelho firme ao calibrar. Aproxime o metal devagar.
    </p>

    <script>
        let baseLine = 0;
        let isRunning = false;

        const indicator = document.getElementById('indicator');
        const valueDisplay = document.getElementById('valueDisplay');
        const statusText = document.getElementById('statusText');
        const calibrateBtn = document.getElementById('calibrateBtn');
        
        const sensitivityControl = document.getElementById('sensitivity');
        const gainControl = document.getElementById('gain');
        const sensValueText = document.getElementById('sensValue');
        const gainValueText = document.getElementById('gainValue');

        // Atualiza labels
        sensitivityControl.addEventListener('input', (e) => {
            sensValueText.textContent = e.target.value;
        });
        gainControl.addEventListener('input', (e) => {
            gainValueText.textContent = parseFloat(e.target.value).toFixed(1);
        });

        // Função principal - AGORA USANDO A API COMPATÍVEL
        function handleSensor(event) {
            // Pega os dados do campo magnético (alpha, beta, gamma não são ângulos aqui)
            // A propriedade magneticField contém a força real
            let x = event.alpha || 0;
            let y = event.beta || 0;
            let z = event.gamma || 0;

            // Se o evento fornecer o campo magnético diretamente (melhor precisão)
            if (event.magneticField) {
                x = event.magneticField.x;
                y = event.magneticField.y;
                z = event.magneticField.z;
            }

            const gain = parseFloat(gainControl.value);
            x *= gain; y *= gain; z *= gain;

            // Calcula intensidade total
            const total = Math.sqrt(x*x + y*y + z*z);
            const sensitivity = parseInt(sensitivityControl.value);
            
            // Diferença para a linha de base
            const difference = Math.abs(total - baseLine);

            // Atualiza tela
            valueDisplay.textContent = difference.toFixed(2);

            if (difference > sensitivity) {
                // ALERTA
                indicator.classList.remove('bg-green-600', 'shadow-green-500');
                indicator.classList.add('bg-red-600', 'shadow-[0_0_40px_rgba(220,38,38,0.8)]');
                statusText.textContent = "DETECTADO!";
                if(navigator.vibrate) navigator.vibrate([50,50,50]);
            } else {
                // NORMAL
                indicator.classList.remove('bg-red-600', 'shadow-red-500');
                indicator.classList.add('bg-green-600', 'shadow-[0_0_30px_rgba(22,163,74,0.6)]');
                statusText.textContent = difference.toFixed(1);
            }
        }

        // Calibrar = Zerar
        function calibrate() {
            if (!isRunning) return;
            // Pega uma leitura rápida para usar como base
            let tempX = 0, tempY = 0, tempZ = 0;
            const tempEvent = window.lastSensorEvent;
            if(tempEvent) {
                if (tempEvent.magneticField) {
                    tempX = tempEvent.magneticField.x;
                    tempY = tempEvent.magneticField.y;
                    tempZ = tempEvent.magneticField.z;
                } else {
                    tempX = tempEvent.alpha || 0;
                    tempY = tempEvent.beta || 0;
                    tempZ = tempEvent.gamma || 0;
                }
                const gain = parseFloat(gainControl.value);
                baseLine = Math.sqrt((tempX*gain)**2 + (tempY*gain)**2 + (tempZ*gain)**2);
            }
            
            indicator.classList.add('scale-110');
            setTimeout(() => indicator.classList.remove('scale-110'), 200);
        }

        calibrateBtn.addEventListener('click', calibrate);

        // INICIALIZAÇÃO
        window.addEventListener('load', () => {
            console.log("Tentando conectar...");
            
            // Tenta o método mais novo primeiro
            if (window.DeviceOrientationEvent) {
                // No Android moderno, precisa pedir permissão as vezes
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', handleSensor);
                            isRunning = true;
                            setTimeout(calibrate, 500);
                        } else {
                            alert("Permissão negada.");
                        }
                    })
                    .catch(console.error);
                } else {
                    // Android antigo / Chrome padrão - funciona direto
                    window.addEventListener('deviceorientation', (e) => {
                        window.lastSensorEvent = e; // Guarda último evento para calibragem
                        handleSensor(e);
                    });
                    isRunning = true;
                    setTimeout(calibrate, 1000);
                    alert("Modo Compatível Ativado!");
                }
            } else {
                alert("Seu aparelho parece não ter sensor magnético ou o bloqueou.");
            }
        });
    </script>
</body>
</html>
