<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detector de Metais</title>
    <style>
        body { margin:0; background:#030407; color:#b8c8e0; font-family:sans-serif; overflow:hidden; touch-action:none; }
        canvas { display:block; }
        .ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        .controls { position:absolute; bottom:20px; left:0; right:0; text-align:center; pointer-events:auto; }
        button { background:#0a1322; color:#00d4a0; border:2px solid #1e3a5f; padding:12px 20px; margin:5px; border-radius:8px; font-size:16px; font-weight:bold; }
        #status { position:absolute; top:60px; left:0; right:0; text-align:center; font-size:14px; color:#ffaa00; }
    </style>
</head>
<body>

<canvas id="mainCanvas"></canvas>

<div class="ui">
    <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; color:#00d4a0;">◈ DETECTOR DE METAIS</h2>
        <span id="backend" style="color:#666; font-size:13px;">Iniciando sensores...</span>
    </div>
    <div id="status">Aguardando permissão dos sensores</div>

    <div class="controls">
        <button id="btnStart">▶ INICIAR</button>
        <button id="btnCalib">⊙ CALIBRAR</button>
        <button id="btnReset">RESET</button>
    </div>
</div>

<script>
// ==================== VARIÁVEIS GLOBAIS ====================
let magRaw = [0, 0, 0];
let gyroRaw = [0, 0, 0];
let isRunning = false;
let mode = 'idle';

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

let cursorX = 0.5, cursorY = 0.5;
let intensity = 0.0;

// ==================== SENSOR API REAL (sem simulação) ====================
let magSensor = null;
let gyroSensor = null;

async function startRealSensors() {
    const statusEl = document.getElementById('status');
    const backendEl = document.getElementById('backend');

    try {
        // Magnetometer (melhor precisão para detector de metais)
        if ('Magnetometer' in window) {
            magSensor = new Magnetometer({ frequency: 60 });
            magSensor.addEventListener('reading', () => {
                magRaw[0] = magSensor.x || 0;
                magRaw[1] = magSensor.y || 0;
                magRaw[2] = magSensor.z || 0;
            });
            magSensor.addEventListener('error', e => console.error(e));
            magSensor.start();
            backendEl.textContent = "Magnetometer API";
        } else {
            backendEl.textContent = "DeviceMotion (fallback)";
        }

        // Gyroscope (para detectar movimento)
        if ('Gyroscope' in window) {
            gyroSensor = new Gyroscope({ frequency: 60 });
            gyroSensor.addEventListener('reading', () => {
                gyroRaw[0] = gyroSensor.x || 0;
                gyroRaw[1] = gyroSensor.y || 0;
                gyroRaw[2] = gyroSensor.z || 0;
            });
            gyroSensor.start();
        }

        statusEl.textContent = "Sensores ativados ✓";
        statusEl.style.color = "#00ffaa";
    } catch (err) {
        console.error(err);
        statusEl.textContent = "Erro ao acessar sensores";
        backendEl.textContent = "Fallback ativado";
    }
}

// ==================== LÓGICA DO DETECTOR (igual ao Python) ====================
class EMA {
    constructor(alpha) { this.alpha = alpha; this.value = null; }
    update(x) {
        if (this.value === null) this.value = x;
        else this.value += this.alpha * (x - this.value);
        return this.value;
    }
    reset() { this.value = null; }
}

const detector = {
    sm_x: new EMA(0.35), sm_y: new EMA(0.35), sm_z: new EMA(0.35),
    rf_x: new EMA(0.004), rf_y: new EMA(0.004), rf_z: new EMA(0.004),
    ox: new EMA(0.22), oy: new EMA(0.22), om: new EMA(0.16),
    ge: new EMA(0.35),
    initFrames: 0,
    initiated: false,

    process() {
        const sx = this.sm_x.update(magRaw[0]);
        const sy = this.sm_y.update(magRaw[1]);
        const sz = this.sm_z.update(magRaw[2]);

        const gs = Math.hypot(gyroRaw[0], gyroRaw[1], gyroRaw[2]);
        const mov = gs > 0.07;

        if (!mov) {
            this.rf_x.update(sx);
            this.rf_y.update(sy);
            this.rf_z.update(sz);
        }

        const rx = this.rf_x.value || sx;
        const ry = this.rf_y.value || sy;
        const rz = this.rf_z.value || sz;

        let ax = sx - rx, ay = sy - ry, az = sz - rz;
        let intens = Math.hypot(ax, ay, az);

        if (mov) intens *= Math.max(0, 1 - (gs - 0.07) * 4);

        let dx = 0, dy = 0;
        if (intens > 0.10) {
            dx = -ax / intens;
            dy = -ay / intens;
        } else {
            intens = Math.max(0, intens - 0.05);
        }

        return {
            dx: this.ox.update(dx),
            dy: this.oy.update(dy),
            intens: Math.min(this.om.update(intens), 1.0),
            mov: mov
        };
    }
};

// ==================== DESENHO ====================
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h * 0.42;
    const R = Math.min(w, h) * 0.37;

    // Fundo
    ctx.fillStyle = '#05080f';
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();

    // Círculos
    ctx.strokeStyle = '#1a2a4a';
    ctx.lineWidth = 2;
    for (let i = 1; i <= 4; i++) {
        ctx.beginPath(); ctx.arc(cx, cy, R * i / 4, 0, Math.PI * 2); ctx.stroke();
    }

    // Sweep
    const ang = (Date.now() % 1800) / 1800 * Math.PI * 2;
    ctx.strokeStyle = 'rgba(0, 212, 160, 0.45)';
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(ang), cy + R * Math.sin(ang));
    ctx.stroke();

    // Cursor
    const px = cx + (cursorX - 0.5) * R * 1.75;
    const py = cy + (cursorY - 0.5) * R * 1.75;

    const col = intensity > 0.4 ? '#ff6600' : '#00ccff';
    ctx.fillStyle = col + '33';
    ctx.beginPath(); ctx.arc(px, py, 22, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fill();
}

// ==================== LOOP PRINCIPAL ====================
function loop() {
    if (isRunning) {
        const res = detector.process();

        // Mapeamento do cursor
        cursorX = Math.max(0.05, Math.min(0.95, 0.5 + res.dx * 0.75 * res.intens));
        cursorY = Math.max(0.05, Math.min(0.95, 0.5 + res.dy * 0.75 * res.intens));

        intensity = res.intens;
    }

    draw();
    requestAnimationFrame(loop);
}

// ==================== CONTROLES ====================
document.getElementById('btnStart').onclick = () => {
    isRunning = !isRunning;
    document.getElementById('btnStart').textContent = isRunning ? '■ PARAR' : '▶ INICIAR';
};

document.getElementById('btnReset').onclick = () => {
    detector.sm_x.reset(); detector.sm_y.reset(); detector.sm_z.reset();
    detector.rf_x.reset(); detector.rf_y.reset(); detector.rf_z.reset();
    cursorX = cursorY = 0.5;
    intensity = 0;
};

// ==================== INICIALIZAÇÃO ====================
window.onload = () => {
    resize();
    window.addEventListener('resize', resize);

    startRealSensors();
    loop();
};
</script>
</body>
</html>
