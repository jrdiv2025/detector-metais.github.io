<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detector de Metais</title>
    <style>
        body { margin:0; background:#030407; color:#b8c8e0; font-family:sans-serif; overflow:hidden; touch-action:none; }
        canvas { display:block; }
        .ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        .controls { position:absolute; bottom:20px; left:0; right:0; text-align:center; pointer-events:auto; }
        button { background:#0a1322; color:#00d4a0; border:2px solid #1e3a5f; padding:12px 24px; margin:6px; border-radius:10px; font-size:16px; font-weight:bold; }
        #debug { position:absolute; top:70px; left:10px; right:10px; background:rgba(0,0,0,0.7); padding:10px; font-size:13px; border-radius:8px; max-height:40%; overflow:auto; }
    </style>
</head>
<body>

<canvas id="mainCanvas"></canvas>

<div class="ui">
    <div style="padding:15px; display:flex; justify-content:space-between;">
        <h2 style="margin:0; color:#00d4a0;">◈ DETECTOR DE METAIS</h2>
        <span id="backend" style="color:#888; font-size:13px;">Detectando sensores...</span>
    </div>
    
    <div id="debug"></div>

    <div class="controls">
        <button id="btnStart">▶ INICIAR</button>
        <button id="btnCalib">⊙ CALIBRAR</button>
        <button id="btnReset">RESET</button>
    </div>
</div>

<script>
// ==================== DEBUG ====================
const debugEl = document.getElementById('debug');
function log(msg) {
    debugEl.innerHTML += msg + '<br>';
    debugEl.scrollTop = debugEl.scrollHeight;
}

// ==================== VARIÁVEIS ====================
let magRaw = [0, 0, 0];
let isRunning = false;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

let cursorX = 0.5, cursorY = 0.5;
let intensity = 0.0;

// ==================== SENSOR Fallback (mais compatível) ====================
function startSensors() {
    const backendEl = document.getElementById('backend');

    // DeviceOrientation (melhor suporte para magnetômetro indireto)
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (event) => {
            // Usa alpha (rumo) + beta/gamma para estimar variação magnética
            if (event.alpha !== null) {
                magRaw[0] = event.alpha || 0;     // Rumo
                magRaw[1] = event.beta || 0;      // Inclinação
                magRaw[2] = event.gamma || 0;     // Rotação
                backendEl.textContent = "DeviceOrientation ✓";
            }
        });
        log("DeviceOrientation ativado");
    }

    // DeviceMotion (aceleração + rotação)
    if (window.DeviceMotionEvent) {
        window.addEventListener('devicemotion', (event) => {
            if (event.rotationRate) {
                // Pode ajudar na detecção de movimento
            }
        });
        log("DeviceMotion ativado");
    } else {
        log("⚠ Nenhum sensor de orientação detectado");
    }

    // Tenta Magnetometer (novo)
    if ('Magnetometer' in window) {
        try {
            const magSensor = new Magnetometer({ frequency: 50 });
            magSensor.addEventListener('reading', () => {
                magRaw[0] = magSensor.x || 0;
                magRaw[1] = magSensor.y || 0;
                magRaw[2] = magSensor.z || 0;
                backendEl.textContent = "Magnetometer API ✓";
            });
            magSensor.start();
            log("Magnetometer nativo ativado");
        } catch(e) { log("Magnetometer falhou: " + e.message); }
    }
}

// ==================== DETECTOR SIMPLIFICADO ====================
const detector = {
    prevMag: [0,0,0],
    process() {
        const dx = magRaw[0] - this.prevMag[0];
        const dy = magRaw[1] - this.prevMag[1];
        const dz = magRaw[2] - this.prevMag[2];
        
        this.prevMag[0] = magRaw[0];
        this.prevMag[1] = magRaw[1];
        this.prevMag[2] = magRaw[2];

        const intens = Math.hypot(dx, dy, dz) * 0.8; // Sensibilidade

        return {
            dx: dx * 0.05,
            dy: dy * 0.05,
            intens: Math.min(intens / 8, 1.0)  // Ajuste o /8 conforme seu celular
        };
    }
};

// ==================== DESENHO ====================
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h * 0.42;
    const R = Math.min(w, h) * 0.37;

    // Fundo radar
    ctx.fillStyle = '#05080f';
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.fill();

    // Círculos
    ctx.strokeStyle = '#1a2a4a';
    ctx.lineWidth = 2;
    for (let i = 1; i <= 4; i++) {
        ctx.beginPath(); ctx.arc(cx, cy, R * i / 4, 0, Math.PI*2); ctx.stroke();
    }

    // Sweep
    const ang = (Date.now() % 1600) / 1600 * Math.PI * 2;
    ctx.strokeStyle = 'rgba(0, 212, 160, 0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(ang), cy + R * Math.sin(ang));
    ctx.stroke();

    // Cursor
    const px = cx + (cursorX - 0.5) * R * 1.7;
    const py = cy + (cursorY - 0.5) * R * 1.7;

    const color = intensity > 0.35 ? '#ff6600' : '#00ccff';
    
    ctx.fillStyle = color + '44';
    ctx.beginPath(); ctx.arc(px, py, 26, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(px, py, 11, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px, py, 3.5, 0, Math.PI*2); ctx.fill();
}

// Loop
function loop() {
    if (isRunning) {
        const res = detector.process();
        cursorX = Math.max(0.08, Math.min(0.92, 0.5 + res.dx * 1.2));
        cursorY = Math.max(0.08, Math.min(0.92, 0.5 + res.dy * 1.2));
        intensity = res.intens;
    }
    draw();
    requestAnimationFrame(loop);
}

// ==================== BOTÕES ====================
document.getElementById('btnStart').onclick = () => {
    isRunning = !isRunning;
    document.getElementById('btnStart').textContent = isRunning ? '■ PARAR' : '▶ INICIAR';
};

document.getElementById('btnReset').onclick = () => {
    cursorX = cursorY = 0.5;
    intensity = 0;
};

// ==================== INICIAR ====================
window.onload = () => {
    resize();
    window.addEventListener('resize', resize);
    startSensors();
    loop();
    
    log("App iniciado. Aproxime um objeto metálico do celular.");
};
</script>
</body>
</html>
