<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detector de Metais</title>
    <style>
        body { margin:0; background:#030407; color:#b8c8e0; font-family:sans-serif; overflow:hidden; }
        canvas { display:block; }
        #info { position:absolute; top:10px; left:10px; right:10px; background:rgba(0,0,0,0.85); padding:12px; border-radius:8px; font-size:14px; line-height:1.4; }
        .controls { position:absolute; bottom:20px; left:0; right:0; text-align:center; }
        button { background:#0a1322; color:#00d4a0; border:2px solid #1e3a5f; padding:14px 20px; margin:5px; border-radius:10px; font-size:16px; font-weight:bold; }
    </style>
</head>
<body>

<canvas id="mainCanvas"></canvas>

<div id="info">
    <strong>◈ DETECTOR DE METAIS</strong><br>
    <span id="status">Aguardando sensores...</span><br>
    <small id="debug"></small>
</div>

<div class="controls">
    <button id="btnStart">▶ INICIAR</button>
    <button id="btnReset">RESET</button>
</div>

<script>
// Variáveis
let heading = 0, lastHeading = 0;
let baseline = 0;
let isRunning = false;
let cursorX = 0.5, cursorY = 0.5;
let intensity = 0;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const debugEl = document.getElementById('debug');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h*0.45;
    const R = Math.min(w,h)*0.38;

    ctx.fillStyle = '#05080f';
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.fill();

    ctx.strokeStyle = '#1a2a4a';
    for (let i=1; i<=4; i++) {
        ctx.beginPath(); ctx.arc(cx, cy, R*i/4, 0, Math.PI*2); ctx.stroke();
    }

    // Sweep
    const ang = (Date.now() % 1100)/1100 * Math.PI*2;
    ctx.strokeStyle = '#00d4a0';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R*Math.cos(ang), cy + R*Math.sin(ang));
    ctx.stroke();

    // Cursor
    const px = cx + (cursorX-0.5)*R*1.7;
    const py = cy + (cursorY-0.5)*R*1.7;
    const col = intensity > 0.35 ? '#ff5500' : '#00bbff';

    ctx.fillStyle = col + '55';
    ctx.beginPath(); ctx.arc(px, py, 26, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(px, py, 11, 0, Math.PI*2); ctx.fill();
}

function loop() {
    if (isRunning) {
        const delta = Math.abs(heading - lastHeading);
        lastHeading = heading;

        // Atualiza baseline lentamente
        baseline = baseline * 0.97 + heading * 0.03;

        const variation = Math.abs(heading - baseline);
        intensity = Math.min(variation / 35, 1.0);   // Ajuste o 35 se necessário

        cursorX = 0.5 + Math.sin(heading * Math.PI / 180) * intensity * 0.9;
        cursorY = 0.5 + Math.cos(heading * Math.PI / 180) * intensity * 0.7;
    }
    draw();
    requestAnimationFrame(loop);
}

// Sensores
function startSensors() {
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (e) => {
            if (e.alpha !== null) heading = e.alpha;
        });
        statusEl.textContent = "✅ Sensores OK — Teste com metal";
        debugEl.textContent = "Dica: Segure horizontal + aproxime metal devagar";
    } else {
        statusEl.textContent = "❌ Sensores não suportados";
    }
}

document.getElementById('btnStart').onclick = () => {
    isRunning = !isRunning;
    document.getElementById('btnStart').textContent = isRunning ? '■ PARAR' : '▶ INICIAR';
};

document.getElementById('btnReset').onclick = () => {
    baseline = heading;
    cursorX = cursorY = 0.5;
    intensity = 0;
};

window.onload = () => {
    resize();
    window.addEventListener('resize', resize);
    startSensors();
    loop();
};
</script>
</body>
</html>
