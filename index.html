<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Metais | Dola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&display=swap');
        
        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at top, #1a2a6c, #0d1117 70%);
            color: #e0e0e0;
            overflow: hidden;
        }

        .glow {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.2);
        }

        .meter-bar {
            transition: height 0.1s ease-out, background-color 0.2s;
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .needle {
            transition: transform 0.2s ease-out;
            transform-origin: bottom center;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center">

    <div class="container max-w-md w-full px-4">
        
        <!-- HEADER -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                <i class="fa-solid fa-magnifying-glass-chart"></i> METAL DETECTOR
            </h1>
            <p class="text-slate-400 text-sm">Modo: Alta Sensibilidade</p>
        </div>

        <!-- DISPLAY PRINCIPAL -->
        <div class="bg-slate-900/70 rounded-3xl p-6 border border-slate-700 glow mb-6">
            
            <!-- VALOR NUMÉRICO -->
            <div class="text-center mb-4">
                <div id="valueDisplay" class="text-7xl font-bold text-cyan-300 leading-none">0.0</div>
                <div class="text-slate-500 text-xs mt-1">UNIDADES</div>
            </div>

            <!-- INDICADOR VISUAL -->
            <div class="flex items-end justify-center space-x-1 h-32 bg-slate-800/50 rounded-xl p-2 border border-slate-700 overflow-hidden">
                <div class="meter-bar w-4 bg-green-500" id="bar1" style="height: 5%"></div>
                <div class="meter-bar w-4 bg-green-400" id="bar2" style="height: 5%"></div>
                <div class="meter-bar w-4 bg-yellow-400" id="bar3" style="height: 5%"></div>
                <div class="meter-bar w-4 bg-yellow-500" id="bar4" style="height: 5%"></div>
                <div class="meter-bar w-4 bg-orange-500" id="bar5" style="height: 5%"></div>
                <div class="meter-bar w-4 bg-orange-600" id="bar6" style="height: 5%"></div>
                <div class="meter-bar w-4 bg-red-600" id="bar7" style="height: 5%"></div>
                <div class="meter-bar w-4 bg-red-500 animate-pulse" id="bar8" style="height: 5%"></div>
            </div>
        </div>

        <!-- STATUS E BOTÃO -->
        <div class="flex justify-between items-center">
            <div class="text-sm">
                Status: <span id="statusText" class="text-green-400 font-bold">AGUARDANDO...</span>
            </div>
            
            <button onclick="calibrar()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-full shadow-lg transition transform active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-crosshairs"></i> CALIBRAR
            </button>
        </div>

        <div class="text-center mt-6 text-xs text-slate-600">
            Aproxime o celular de objetos metálicos para detectar variações no campo magnético.
        </div>

    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const SENSIBILIDADE = 100;  // Quanto maior, mais sensível
        const SUAVIZACAO = 0.85;    // Filtro (0 = muito travado, 1 = muito rápido)
        
        // --- VARIAVEIS GLOBAIS ---
        let valorBase = 0;
        let valorAnterior = 0;
        let iniciado = false;

        // --- ELEMENTOS HTML ---
        const valueDisplay = document.getElementById('valueDisplay');
        const statusText = document.getElementById('statusText');
        const bars = [
            document.getElementById('bar1'),
            document.getElementById('bar2'),
            document.getElementById('bar3'),
            document.getElementById('bar4'),
            document.getElementById('bar5'),
            document.getElementById('bar6'),
            document.getElementById('bar7'),
            document.getElementById('bar8')
        ];

        // --- FUNÇÕES ---

        function calibrar() {
            valorBase = null; // Reseta para pegar nova base
            valorAnterior = 0;
            valueDisplay.innerHTML = "0.0";
            statusText.innerHTML = "CALIBRANDO...";
            statusText.className = "text-yellow-400 font-bold";
            updateBars(0);
            
            setTimeout(() => {
                statusText.innerHTML = "PRONTO";
                statusText.className = "text-green-400 font-bold";
            }, 1000);
        }

        function updateBars(nivel) {
            // Nivel vai de 0 a 100
            const ligarAte = Math.floor((nivel / 100) * bars.length);
            
            bars.forEach((bar, index) => {
                if(index < ligarAte) {
                    bar.style.height = "95%";
                    bar.style.opacity = "1";
                } else {
                    bar.style.height = "5%";
                    bar.style.opacity = "0.3";
                }
            });
        }

        function handleSensor(event) {
            // Pega dados
            const x = event.magneticField.x;
            const y = event.magneticField.y;
            const z = event.magneticField.z;
            
            // Calcula intensidade total do campo
            const total = Math.sqrt(x*x + y*y + z*z);

            // Primeira leitura ou recalibragem
            if (valorBase === null || !iniciado) {
                valorBase = total;
                iniciado = true;
                return;
            }

            // 1. CALCULA DIFERENÇA
            let variacao = total - valorBase;

            // 2. AMPLIFICA O SINAL
            let valorBruto = variacao * SENSIBILIDADE;

            // 3. FILTRO / SUAVIZAÇÃO
            let valorFinal = (valorBruto * (1 - SUAVIZACAO)) + (valorAnterior * SUAVIZACAO);
            valorAnterior = valorFinal;

            // Garante valor positivo para exibição
            let valorAbsoluto = Math.abs(valorFinal);
            
            // Limita para visualização (0 a 100)
            let exibicao = Math.min(100, Math.max(0, valorAbsoluto));

            // ATUALIZA TELA
            valueDisplay.innerHTML = exibicao.toFixed(1);
            
            // Atualiza barras
            updateBars(exibicao);

            // Muda Status
            if(exibicao < 5) {
                statusText.innerHTML = "SEGURANÇA";
                statusText.className = "text-green-400 font-bold";
            } else if (exibicao < 30) {
                statusText.innerHTML = "DETECTANDO...";
                statusText.className = "text-yellow-400 font-bold";
            } else {
                statusText.innerHTML = "METAL!";
                statusText.className = "text-red-500 font-bold text-lg pulse";
            }
        }

        // --- INICIALIZAÇÃO ---
        window.addEventListener('load', () => {
            if (window.MagneticSensor) {
                window.addEventListener('magneticfield', handleSensor);
                MagneticSensor.start();
                calibrar();
            } else {
                // Fallback para navegadores que usam DeviceMotion ou outro padrão
                window.addEventListener('devicemotion', (e) => {
                    if(e.rotationRate && e.rotationRate.alpha !== null) {
                         // Tenta acessar de outra forma se disponível
                    }
                });
                
                alert("Seu navegador parece não suportar o acesso direto ao sensor ou precisa de HTTPS. Teste em outro navegador ou servidor seguro.");
            }
        });

        // Correção para API padrão do navegador
        if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(permissionState => {
                if (permissionState === 'granted') {
                    window.addEventListener('devicemotion', handleSensor);
                }
            });
        }

    </script>
</body>
</html>
