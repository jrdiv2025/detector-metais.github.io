<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DJ Voice Beat Machine</title>

<style>
body{
    margin:0;
    background:#050505;
    color:#00ffcc;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:15px;
}

.container{
    padding:15px;
}

button{
    background:#111;
    color:#00ffcc;
    border:2px solid #00ffcc;
    padding:12px 18px;
    margin:6px;
    border-radius:12px;
    font-size:16px;
}

button:hover{
    background:#00ffcc;
    color:black;
}

.slider{
    width:90%;
}

.visual{
    width:90%;
    height:20px;
    margin:auto;
    background:#111;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.bar{
    height:100%;
    width:0%;
    background:#00ffcc;
}

.status{
    margin-top:10px;
    font-size:14px;
    color:#aaa;
}
</style>
</head>
<body>

<h1>🎧 DJ Voice Beat Machine</h1>

<div class="container">

<button onclick="startAudio()">▶ Iniciar</button>
<button onclick="stopAll()">⏹ Parar</button>
<button onclick="captureVoice()">🎤 Capturar Voz</button>

<br><br>

<label>BPM</label><br>
<input type="range" min="70" max="180" value="120" class="slider" id="bpm">

<div class="visual">
<div class="bar" id="bar"></div>
</div>

<div class="status" id="status">
Pronto.
</div>

</div>

<script>

let audioCtx;
let masterGain;
let beatInterval;
let analyser;
let micStream;

const bar = document.getElementById("bar");
const statusText = document.getElementById("status");

function startAudio(){

    if(audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.8;
    masterGain.connect(audioCtx.destination);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    masterGain.connect(analyser);

    startBeat();
    animateVisualizer();

    statusText.innerHTML = "Sistema iniciado.";
}

function stopAll(){

    clearInterval(beatInterval);

    if(audioCtx){
        audioCtx.close();
        audioCtx = null;
    }

    statusText.innerHTML = "Parado.";
}

function startBeat(){

    beatInterval = setInterval(()=>{

        playKick();
        randomPerc();

    }, getBeatTime());

}

function getBeatTime(){
    const bpm = parseInt(document.getElementById("bpm").value);
    return (60000 / bpm);
}

document.getElementById("bpm").addEventListener("input",()=>{

    clearInterval(beatInterval);
    startBeat();

});

function playKick(){

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";

    osc.frequency.setValueAtTime(120,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40,audioCtx.currentTime+0.15);

    gain.gain.setValueAtTime(1,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();
    osc.stop(audioCtx.currentTime+0.15);
}

function randomPerc(){

    const types = ["square","triangle","sawtooth"];

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = types[Math.floor(Math.random()*types.length)];

    osc.frequency.value = 200 + Math.random()*800;

    gain.gain.value = 0.08;

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();

    osc.stop(audioCtx.currentTime + (0.03 + Math.random()*0.1));
}

async function captureVoice(){

    if(!audioCtx) startAudio();

    statusText.innerHTML = "Capturando voz...";

    micStream = await navigator.mediaDevices.getUserMedia({audio:true});

    const mediaRecorder = new MediaRecorder(micStream);

    let chunks = [];

    mediaRecorder.ondataavailable = e=>{
        chunks.push(e.data);
    };

    mediaRecorder.onstop = ()=>{

        const blob = new Blob(chunks,{type:'audio/webm'});
        const reader = new FileReader();

        reader.onload = async ()=>{

            const arrayBuffer = reader.result;

            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

            djRepeat(audioBuffer);

        };

        reader.readAsArrayBuffer(blob);

    };

    mediaRecorder.start();

    setTimeout(()=>{
        mediaRecorder.stop();
        statusText.innerHTML = "Loop criado.";
    },1000);

}

function djRepeat(buffer){

    const patterns = [
        [0.15,0.15,0.15,1],
        [0.1,0.1,0.2,0.4,1],
        [0.25,0.25,0.5,1],
        [0.05,0.05,0.05,0.2,1]
    ];

    const pattern = patterns[Math.floor(Math.random()*patterns.length)];

    let time = audioCtx.currentTime;

    pattern.forEach((speed,index)=>{

        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();

        source.buffer = buffer;

        source.playbackRate.value = 1/speed;

        gain.gain.value = 0.8 - (index*0.1);

        source.connect(gain);
        gain.connect(masterGain);

        source.start(time);

        time += speed * 0.35;

    });

    randomFX();
}

function randomFX(){

    const delay = audioCtx.createDelay();
    delay.delayTime.value = 0.2 + Math.random()*0.4;

    const feedback = audioCtx.createGain();
    feedback.gain.value = 0.4;

    delay.connect(feedback);
    feedback.connect(delay);

    delay.connect(masterGain);

}

function animateVisualizer(){

    if(!audioCtx) return;

    requestAnimationFrame(animateVisualizer);

    const data = new Uint8Array(analyser.frequencyBinCount);

    analyser.getByteFrequencyData(data);

    let avg = data.reduce((a,b)=>a+b)/data.length;

    bar.style.width = (avg/255*100)+"%";
}

</script>

</body>
</html>
