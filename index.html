<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bússola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .compass-container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* A roda da bússola feita com CSS */
        #compass {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #fff;
            background: #222;
            position: relative;
            transition: transform 0.2s ease-out;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Marcadores de direção */
        .mark {
            position: absolute;
            width: 2px;
            height: 10px;
            background: #fff;
            left: 50%;
            top: 0;
            transform-origin: 50% 150px;
        }

        .mark.main {
            width: 4px;
            height: 15px;
            background: #ff4444;
        }

        /* Agulha */
        .needle {
            position: absolute;
            width: 6px;
            height: 130px;
            background: #ff4444;
            left: 50%;
            top: 50%;
            transform-origin: bottom center;
            transform: translate(-50%, -100%);
            border-radius: 3px;
            z-index: 2;
        }
        .needle::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -8px;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid #333;
        }
        .needle::before {
            content: '';
            position: absolute;
            top: 0;
            left: -8px;
            width: 0;
            height: 0;
            border-left: 11px solid transparent;
            border-right: 11px solid transparent;
            border-bottom: 20px solid #ff4444;
        }

        /* Centro dos graus */
        #degree {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 3;
        }

        #direction {
            margin-top: 30px;
            font-size: 32px;
            font-weight: bold;
        }

        #status {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="compass-container">
        <div id="compass">
            <div class="needle"></div>
            <!-- Marcadores -->
            <div class="mark main" style="transform: rotate(0deg)"></div>
            <div class="mark" style="transform: rotate(45deg)"></div>
            <div class="mark" style="transform: rotate(90deg)"></div>
            <div class="mark" style="transform: rotate(135deg)"></div>
            <div class="mark main" style="transform: rotate(180deg)"></div>
            <div class="mark" style="transform: rotate(225deg)"></div>
            <div class="mark" style="transform: rotate(270deg)"></div>
            <div class="mark" style="transform: rotate(315deg)"></div>
        </div>
        <div id="degree">0°</div>
    </div>

    <div id="direction">N</div>
    <div id="status">Inicializando...</div>

    <script>
        const compass = document.getElementById('compass');
        const degreeDisplay = document.getElementById('degree');
        const directionDisplay = document.getElementById('direction');
        const statusDisplay = document.getElementById('status');

        const directions = ['N', 'NE', 'L', 'SE', 'S', 'SO', 'O', 'NO'];

        if (window.DeviceOrientationEvent) {
            statusDisplay.innerText = "Solicitando permissão...";

            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            statusDisplay.innerText = "Bússola ativa";
                        } else {
                            statusDisplay.innerText = "Permissão negada";
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                statusDisplay.innerText = "Bússola ativa";
            }
        } else {
            statusDisplay.innerText = "Seu dispositivo não suporta sensor de orientação";
        }

        function handleOrientation(event) {
            let alpha = event.alpha;

            if (alpha !== null) {
                compass.style.transform = `rotate(${-alpha}deg)`;
                degreeDisplay.innerText = Math.round(alpha) + '°';
                
                const index = Math.round(((alpha % 360) / 45)) % 8;
                directionDisplay.innerText = directions[index];
            }
        }
    </script>

</body>
</html>
